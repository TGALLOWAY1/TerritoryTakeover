# Phase 3d Elo round-robin pool.
#
# Anchor = uniform-random at Elo 0. The pool covers:
#   * the two non-learned baselines (random, greedy)
#   * the six trained agents from the headline ablation
#     (curriculum arm x 3 seeds, direct arm x 3 seeds)
#   * the reference agent archived under docs/phase3d/.
#
# All entries use the 10x10 / 2p setting matching the trained checkpoints.
# The AlphaZero entries point at net_final.pt under each run's out dir;
# update paths after running the ablation.

agents:
  - name: random
    kind: random

  - name: greedy
    kind: greedy

  - name: curriculum_seed0
    kind: alphazero
    params:
      board_size: 10
      num_players: 2
      num_res_blocks: 2
      channels: 32
      value_hidden: 32
      head_type: conv
      iterations: 16
      c_puct: 1.25
      checkpoint: results/phase3d/ablation/arm_curriculum_seed_0/net_final.pt

  - name: curriculum_seed1
    kind: alphazero
    params:
      board_size: 10
      num_players: 2
      num_res_blocks: 2
      channels: 32
      value_hidden: 32
      head_type: conv
      iterations: 16
      c_puct: 1.25
      checkpoint: results/phase3d/ablation/arm_curriculum_seed_1/net_final.pt

  - name: curriculum_seed2
    kind: alphazero
    params:
      board_size: 10
      num_players: 2
      num_res_blocks: 2
      channels: 32
      value_hidden: 32
      head_type: conv
      iterations: 16
      c_puct: 1.25
      checkpoint: results/phase3d/ablation/arm_curriculum_seed_2/net_final.pt

  - name: direct_seed0
    kind: alphazero
    params:
      board_size: 10
      num_players: 2
      num_res_blocks: 2
      channels: 32
      value_hidden: 32
      head_type: conv
      iterations: 16
      c_puct: 1.25
      checkpoint: results/phase3d/ablation/arm_direct_seed_0/net_final.pt

  - name: direct_seed1
    kind: alphazero
    params:
      board_size: 10
      num_players: 2
      num_res_blocks: 2
      channels: 32
      value_hidden: 32
      head_type: conv
      iterations: 16
      c_puct: 1.25
      checkpoint: results/phase3d/ablation/arm_direct_seed_1/net_final.pt

  - name: direct_seed2
    kind: alphazero
    params:
      board_size: 10
      num_players: 2
      num_res_blocks: 2
      channels: 32
      value_hidden: 32
      head_type: conv
      iterations: 16
      c_puct: 1.25
      checkpoint: results/phase3d/ablation/arm_direct_seed_2/net_final.pt

  - name: reference
