name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest
        run: pytest

      # Ruff and mypy are currently advisory — the repo has a small
      # amount of pre-existing lint/typecheck debt that is being worked
      # down separately. Enforcing blocks here until that lands.
      - name: Ruff (advisory)
        continue-on-error: true
        run: ruff check .

      - name: Mypy (advisory)
        continue-on-error: true
        run: mypy
