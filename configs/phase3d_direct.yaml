# Phase 3d direct-training control (no curriculum).
#
# Matched compute budget: the single stage consumes the same total self-play
# step budget as the three-stage curriculum in phase3d_curriculum.yaml
# (1500 + 2500 + 4000 = 8000 steps). Same net architecture and train
# hyperparameters so the comparison isolates the curriculum as the only
# independent variable.

net:
  num_res_blocks: 2
  channels: 32
  value_hidden: 32
  head_type: conv

train:
  batch_size: 32
  learning_rate: 0.001
  l2_weight: 0.0001
  value_loss_coef: 1.0
  buffer_capacity: 20000
  eval_games_per_check: 8
  iterations_per_eval: 1

curriculum:
  stages:
    - name: direct_10x10_2p
      board_size: 10
      num_players: 2
      puct_iterations: 16
      games_per_iteration: 4
      train_steps_per_iteration: 40
      temperature_moves: 10
      max_half_moves: 160
      promotion:
        max_self_play_steps: 8000
        elo_gain_window: 5
        elo_gain_threshold: 8.0
        min_evaluations: 5
