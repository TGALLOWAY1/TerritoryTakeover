# Phase 3d Elo round-robin pool.
#
# Anchor = uniform-random at Elo 0. All AlphaZero entries use
# iterations = 4 to keep wall-clock tractable; this is below the
# ablation's training-time puct_iterations = 8 so the Elo is a
# conservative estimate of the agent's playing strength.
#
# The reference agent is docs/phase3d/net_reference.pt (= the
# curriculum arm, seed 0, the best run from the headline ablation).
# It is also listed as curriculum_seed0 in the pool so the reference's
# Elo equals that agent's Elo directly.

agents:
  - name: random
    kind: random

  - name: greedy
    kind: greedy

  - name: curriculum_seed0
    kind: alphazero
    params:
      board_size: 10
      num_players: 2
      num_res_blocks: 2
      channels: 32
      value_hidden: 32
      head_type: conv
      iterations: 4
      c_puct: 1.25
      checkpoint: results/phase3d/ablation/arm_curriculum_seed_0/net_final.pt

  - name: curriculum_seed1
    kind: alphazero
    params:
      board_size: 10
      num_players: 2
      num_res_blocks: 2
      channels: 32
      value_hidden: 32
      head_type: conv
      iterations: 4
      c_puct: 1.25
      checkpoint: results/phase3d/ablation/arm_curriculum_seed_1/net_final.pt

  - name: curriculum_seed2
    kind: alphazero
    params:
      board_size: 10
      num_players: 2
      num_res_blocks: 2
      channels: 32
      value_hidden: 32
      head_type: conv
      iterations: 4
      c_puct: 1.25
      checkpoint: results/phase3d/ablation/arm_curriculum_seed_2/net_final.pt

  - name: direct_seed0
    kind: alphazero
    params:
      board_size: 10
      num_players: 2
      num_res_blocks: 2
      channels: 32
      value_hidden: 32
      head_type: conv
      iterations: 4
      c_puct: 1.25
      checkpoint: results/phase3d/ablation/arm_direct_seed_0/net_final.pt

  - name: direct_seed1
    kind: alphazero
    params:
      board_size: 10
      num_players: 2
      num_res_blocks: 2
      channels: 32
      value_hidden: 32
      head_type: conv
      iterations: 4
      c_puct: 1.25
      checkpoint: results/phase3d/ablation/arm_direct_seed_1/net_final.pt

  - name: direct_seed2
    kind: alphazero
    params:
      board_size: 10
      num_players: 2
      num_res_blocks: 2
      channels: 32
      value_hidden: 32
      head_type: conv
      iterations: 4
      c_puct: 1.25
      checkpoint: results/phase3d/ablation/arm_direct_seed_2/net_final.pt
